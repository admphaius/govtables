name: CI

# Roda em todo PR e push direto em main
on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: app-src

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app-src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
